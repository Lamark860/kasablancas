# Запрещаем создание пустых issue — пусть выбирают шаблон.
# (Поставь true, если хочешь оставить кнопку «Open blank issue».)
blank_issues_enabled: false

# Контакты, которые видны на странице выбора шаблона — для случаев,
# когда issue не нужна (например, спросить в чате).
contact_links:
  - name: Вопрос в чате
    url: https://t.me/  # ← замени на свой чат / личку
    about: Если вопрос быстрый и не требует тикета — лучше сюда.
