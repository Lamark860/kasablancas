services:
  api:
    build:
      context: ./api
    container_name: vlad-api
    ports:
      - "8100:8000"
    volumes:
      - ./api/src:/app/src
      - ./api/data:/app/data
      - ./api/ephe:/app/ephe
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
      - ./api/tests:/app/tests
    environment:
      - DATABASE_URL=sqlite:///./data/local.db
      - PYTHONUNBUFFERED=1
    command: sh -c "alembic upgrade head && uvicorn vlad.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./web
    container_name: vlad-web
    ports:
      - "3100:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8100
      - NUXT_API_BASE_SERVER=http://api:8000
    command: pnpm dev

