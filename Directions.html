<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Fusion · Hortus — направления визуала</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&family=UnifrakturCook:wght@700&family=Inter+Tight:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter Tight", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="plant-icons.jsx"></script>
<script type="text/babel" src="herbarium.jsx"></script>
<script type="text/babel" src="almanac.jsx"></script>
<script type="text/babel" src="pergament.jsx"></script>

<script type="text/babel" data-presets="env,react">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="herbarium"
          title="A · Гербарий"
          subtitle="serif книжный, охра + тёмно-зелёный, ботаническая точность"
        >
          <DCArtboard id="h-form" label="форма ввода" width={480} height={720}>
            <window.HerbForm />
          </DCArtboard>
          <DCArtboard id="h-expert" label="результат · эксперт" width={720} height={900}>
            <window.HerbExpert />
          </DCArtboard>
          <DCArtboard id="h-client" label="отчёт · клиент" width={480} height={900}>
            <window.HerbClient />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="almanac"
          title="B · Альманах"
          subtitle="старопечатный, символы стихий и фаз луны, терракота"
        >
          <DCArtboard id="a-form" label="форма ввода" width={480} height={720}>
            <window.AlmForm />
          </DCArtboard>
          <DCArtboard id="a-expert" label="результат · эксперт" width={720} height={900}>
            <window.AlmExpert />
          </DCArtboard>
          <DCArtboard id="a-client" label="отчёт · клиент" width={480} height={900}>
            <window.AlmClient />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="pergament"
          title="C · Сад на пергаменте"
          subtitle="премиум-минимализм, акварельные пятна, золотистая графика"
        >
          <DCArtboard id="p-form" label="форма ввода" width={480} height={720}>
            <window.PrgForm />
          </DCArtboard>
          <DCArtboard id="p-expert" label="результат · эксперт" width={720} height={900}>
            <window.PrgExpert />
          </DCArtboard>
          <DCArtboard id="p-client" label="отчёт · клиент" width={480} height={900}>
            <window.PrgClient />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
